name: Gradle CI

on:
  workflow_dispatch:
  push:
  pull_request:
  release:
    types: [created, prereleased]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout AP-Tweaks
      uses: actions/checkout@v7
      with:
        fetch-depth: 0
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        build-scan-publish: true
        build-scan-terms-of-use-url: "https://gradle.com/terms-of-service"
        build-scan-terms-of-use-agree: "yes"

    - name: Build with Gradle
      run: ./gradlew clean build --parallel
      env:
        RELEASE_VERSION: ${{ github.event.release.tag_name }}

    - name: Publish to GitHub Packages
      if: ${{ github.event_name == 'release' }}
      run: ./gradlew publish --parallel
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Stage jar for Actions
      if: ${{ github.event_name != 'release' }}
      run: mkdir staging && cp build/libs/AP-Tweaks.jar staging && mv staging/AP-Tweaks.jar staging/AP-Tweaks_$GITHUB_SHA.jar
    - name: Upload jar to Actions
      if: ${{ github.event_name != 'release' }}
      uses: actions/upload-artifact@v7
      with:
        name: AP-Tweaks_Dev-Build
        path: staging/AP-Tweaks_*.jar

    - name: Stage jar for Release
      if: ${{ github.event_name == 'release' }}
      run: mkdir staging && cp build/libs/AP-Tweaks.jar staging && mv staging/AP-Tweaks.jar staging/AP-Tweaks_${{ github.event.release.tag_name }}.jar
    - name: Upload jar to Release
      if: ${{ github.event_name == 'release' }}
      uses: softprops/action-gh-release@v3
      with:
        files: staging/AP-Tweaks_${{ github.event.release.tag_name }}.jar
        tag_name: ${{ github.event.release.tag_name }}
        token: ${{ secrets.GITHUB_TOKEN }}
